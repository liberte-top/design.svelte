name: guard

on:
  pull_request: {}
  push:
    branches:
      - main

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.6
        with:
          version: 10.33.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm -C e2e exec playwright install chromium
      - run: pnpm run guard
      - run: pnpm -C e2e test

      - name: Install flavor
        env:
          FLAVOR_RELEASES_PUBLIC_URL: https://releases.flavor.perish.uk
        run: |
          set -euo pipefail
          curl -fsSL "${FLAVOR_RELEASES_PUBLIC_URL}/stable/latest/install.sh" \
            | sh -s -- install --public-url "${FLAVOR_RELEASES_PUBLIC_URL}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Flavor check
        run: flavor check
