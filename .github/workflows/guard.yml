name: guard

on:
  pull_request: {}
  push:
    branches:
      - main

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.2

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm -C e2e exec playwright install chromium
      - run: pnpm run guard
      - run: pnpm -C e2e test
