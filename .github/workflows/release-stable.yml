name: release-stable

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish."
        required: true
        type: choice
        options:
          - components
          - icons

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.6
        with:
          version: 10.33.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Configure liberte packages auth
        run: |
          set -euo pipefail
          cat > "$HOME/.npmrc" <<EOF
          @liberte:registry=https://packages.liberte.top/
          //packages.liberte.top/:_authToken=${LIBERTE_PACKAGES_NPM_TOKEN}
          EOF
        env:
          LIBERTE_PACKAGES_NPM_TOKEN: ${{ secrets.LIBERTE_PACKAGES_NPM_TOKEN }}

      - run: pnpm install --frozen-lockfile

      - name: Resolve stable version
        id: version
        run: python3 .github/scripts/version.py --package "${{ inputs.package }}" --channel stable

      - name: Publish stable
        run: >-
          python3 .github/scripts/publish.py
          --package-dir "${{ steps.version.outputs.package_dir }}"
          --package-name "${{ steps.version.outputs.package_name }}"
          --version "${{ steps.version.outputs.release_version }}"
          --tag latest
