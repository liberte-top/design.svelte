<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="theme-color"
      content="#f4f6fb"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#0a0e16"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="description"
      content="liberte.top design — reference page exercising every primitive, atom, and composition in @liberte/svelte-components."
    />
    <title>design · liberte.top</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <script>
      (function () {
        try {
          var k = "liberte-theme";
          var stored = localStorage.getItem(k);
          var t =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia &&
                  matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
